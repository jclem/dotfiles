# Atuin history-search overrides.
# Settings with good upstream defaults are intentionally left unset.
# https://docs.atuin.sh/cli/configuration/config/

# Mise owns updates, so Atuin does not need a separate update check.
update_check = false

# Use Atuin's in-memory daemon index for fast fuzzy history search.
search_mode = "daemon-fuzzy"

# Prefer history from the current Git workspace when available.
filter_mode = "workspace"
workspaces = true

# Accept a selected command immediately; Tab still returns it for editing.
enter_accept = true

# Match the invoking shell's keymap.
keymap_mode = "vim-insert"

[daemon]
enabled = true
autostart = true
