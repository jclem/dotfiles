[tools]
"aqua:npm" = "latest"
node = "latest"
usage = "latest"

[settings]
dotfiles.root = "~/.dotfiles"
experimental = true

# macOS Dock preferences
# https://mise.jdx.dev/bootstrap/macos-defaults.html
[bootstrap.macos.dock]
autohide = true
orientation = "right"
show_recents = false
tilesize = 32

# macOS Finder preferences
# https://mise.jdx.dev/bootstrap/macos-defaults.html
[bootstrap.macos.finder]
preferred_view_style = "column"
show_all_files = true
show_pathbar = true

# Machine bootstrap packages
# https://mise.jdx.dev/bootstrap.html
# https://mise.jdx.dev/bootstrap/packages/brew.html
[bootstrap.packages]
"brew:bat" = "latest"
"brew:btop" = "latest"
"brew:eza" = "latest"
"brew:fd" = "latest"
"brew:fish" = "latest"
"brew:fzf" = "latest"
"brew:gh" = "latest"
"brew:git" = "latest"
"brew:jq" = "latest"
"brew:lazydocker" = "latest"
"brew:lazygit" = "latest"
"brew:neovim" = "latest"
"brew:ripgrep" = "latest"
"brew:watchexec" = "latest"
"brew:wget" = "latest"
"brew:zellij" = "latest"

# User login shell
# https://mise.jdx.dev/bootstrap/user.html
[bootstrap.user]
login_shell = "/opt/homebrew/bin/fish"

# Managed dotfiles
# https://mise.jdx.dev/dotfiles.html
[dotfiles]
# Repository and Mise configuration
"~/.dotfiles" = "~/src/github.com/jclem/dotfiles2"
"~/.config/mise/config.toml" = "~/src/github.com/jclem/dotfiles2/mise.toml"

# Fish shell configuration
"~/.config/fish/config.fish" = ".config/fish/config.fish"
"~/.config/fish/conf.d/" = ".config/fish/conf.d/"
"~/.config/fish/functions/" = ".config/fish/functions/"
