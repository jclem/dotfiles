[settings]
dotfiles.root = "~/.dotfiles"
experimental = true

[dotfiles]
# Repository and Mise configuration
"~/.dotfiles" = "~/src/github.com/jclem/dotfiles2"
"~/.config/mise/config.toml" = "~/src/github.com/jclem/dotfiles2/mise.toml"

# Fish shell configuration
"~/.config/fish/config.fish" = ".config/fish/config.fish"
"~/.config/fish/conf.d/0100-vars.fish" = ".config/fish/conf.d/0100-vars.fish"
"~/.config/fish/conf.d/0200-path.fish" = ".config/fish/conf.d/0200-path.fish"
"~/.config/fish/conf.d/0300-homebrew.fish" = ".config/fish/conf.d/0300-homebrew.fish"
"~/.config/fish/conf.d/0400-abbreviations.fish" = ".config/fish/conf.d/0400-abbreviations.fish"
