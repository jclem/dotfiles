[tools]
"aqua:npm" = "latest"
node = "latest"
usage = "latest"

[settings]
dotfiles.root = "~/.dotfiles"
experimental = true

# Machine bootstrap packages
# https://mise.jdx.dev/bootstrap.html
# https://mise.jdx.dev/bootstrap/packages/brew.html
[bootstrap.packages]
"brew:bat" = "latest"
"brew:btop" = "latest"
"brew:eza" = "latest"
"brew:fd" = "latest"
"brew:fish" = "latest"
"brew:fzf" = "latest"
"brew:gh" = "latest"
"brew:git" = "latest"
"brew:jq" = "latest"
"brew:lazydocker" = "latest"
"brew:lazygit" = "latest"
"brew:neovim" = "latest"
"brew:ripgrep" = "latest"
"brew:watchexec" = "latest"
"brew:wget" = "latest"
"brew:zellij" = "latest"

# Managed dotfiles
# https://mise.jdx.dev/dotfiles.html
[dotfiles]
# Repository and Mise configuration
"~/.dotfiles" = "~/src/github.com/jclem/dotfiles2"
"~/.config/mise/config.toml" = "~/src/github.com/jclem/dotfiles2/mise.toml"

# Fish shell configuration
"~/.config/fish/config.fish" = ".config/fish/config.fish"
"~/.config/fish/conf.d/" = ".config/fish/conf.d/"
