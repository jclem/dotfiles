[tools]
"aqua:npm" = "latest"
atuin = "latest"
codex = "latest"
fnox = "latest"
"github:jclem/get" = "latest"
go = "latest"
"go:golang.org/x/tools/gopls" = "latest"
golangci-lint = "latest"
golangci-lint-langserver = "latest"
lua-language-server = "latest"
node = "latest"
"npm:@actions/languageserver" = "latest"
"npm:@typescript/native-preview" = "7.0.0-dev.20260626.1"
"npm:@vtsls/language-server" = "latest"
"npm:vscode-langservers-extracted" = "latest"
"npm:yaml-language-server" = "latest"
pitchfork = "latest"
"github:mfontanini/presenterm" = "latest"
rust = "latest"
rust-analyzer = "latest"
usage = "latest"
bun = "latest"
"aqua:getsentry/sentry-cli" = "2.42.0"
"github:cameroncooke/AXe" = "1.6.0"
periphery = "3.6.0"
swiftlint = "0.63.2"
tuist = "4.196.0"
xcsift = "1.2.0"

[settings]
dotfiles.root = "~/.dotfiles"
env_shell_expand = true
experimental = true
minimum_release_age_excludes = ["codex"]
trusted_config_paths = ["/Users/jclem/src/github.com/makenotion/notion-next"]

[env]
# Codex config and data home
# https://developers.openai.com/codex/environment-variables#core-locations
CODEX_HOME = "$CONFIG/codex"
CODEX_SQLITE_HOME = "$DATA/codex"

# macOS Dock preferences
# https://mise.jdx.dev/bootstrap/macos-defaults.html
[bootstrap.macos.dock]
autohide = true
orientation = "right"
show_recents = false
tilesize = 32

# macOS Finder preferences
# https://mise.jdx.dev/bootstrap/macos-defaults.html
[bootstrap.macos.finder]
preferred_view_style = "column"
show_all_files = true
show_pathbar = true

[bootstrap.macos.launchd.agents.watch-appearance]
program = "~/.local/bin/watch_appearance.fish"
stdout_path = "~/.local/share/watch_appearance.log"
stderr_path = "~/.local/share/watch_appearance.log"
run_at_load = true

# Machine bootstrap packages
# https://mise.jdx.dev/bootstrap.html
# https://mise.jdx.dev/bootstrap/packages/brew.html
[bootstrap.packages]
"brew:bat" = "latest"
"brew:btop" = "latest"
"brew:eza" = "latest"
"brew:fd" = "latest"
"brew:fish" = "latest"
"brew:fish-lsp" = "latest"
"brew:fzf" = "latest"
"brew:gh" = "latest"
"brew:git" = "latest"
"brew:jq" = "latest"
"brew:lazydocker" = "latest"
"brew:lazygit" = "latest"
"brew:neovim" = "latest"
"brew:ripgrep" = "latest"
"brew:tree-sitter-cli" = "latest"
"brew:watchexec" = "latest"
"brew:wget" = "latest"
"brew:cormacrelf/tap/dark-notify" = "latest"
"brew:zellij" = "latest"
"brew-cask:1password-cli" = "latest"

# User login shell
# https://mise.jdx.dev/bootstrap/user.html
[bootstrap.user]
login_shell = "/opt/homebrew/bin/fish"

# Managed dotfiles
# https://mise.jdx.dev/dotfiles.html
[dotfiles]
"~/.dotfiles" = "~/src/github.com/jclem/dotfiles"

"~/.config/atuin/" = { source = "dot_config/atuin/", mode = "symlink-each" }
"~/.config/bat/" = { source = "dot_config/bat/", mode = "symlink-each" }
"~/.config/btop/" = { source = "dot_config/btop/", mode = "copy" }
"~/.config/codex/config.toml" = { source = "dot_config/codex/config.toml", mode = "copy" }
"~/.config/fish/" = { source = "dot_config/fish/", mode = "symlink-each" }
"~/.config/gh/" = { source = "dot_config/gh/", mode = "symlink-each" }
"~/.config/ghostty/" = { source = "dot_config/ghostty/", mode = "symlink-each" }
"~/.config/lazygit/" = { source = "dot_config/lazygit/", mode = "symlink-each" }
"~/.config/nvim/" = { source = "dot_config/nvim/", mode = "symlink-each" }
"~/.config/pitchfork/" = { source = "dot_config/pitchfork/", mode = "symlink-each" }
"~/.config/presenterm/" = { source = "dot_config/presenterm/", mode = "symlink-each" }
"~/.config/presenterm/themes/highlighting/folio-dark.tmTheme" = { source = "dot_config/bat/themes/folio-dark.tmTheme", mode = "symlink" }
"~/.config/presenterm/themes/highlighting/folio-light.tmTheme" = { source = "dot_config/bat/themes/folio-light.tmTheme", mode = "symlink" }
"~/.config/ripgrep/" = { source = "dot_config/ripgrep/", mode = "symlink-each" }

# Render machine-local Git identity values with Tera.
# https://mise.jdx.dev/templates.html
"~/.config/git/config" = { source = "dot_config/git/config.tmpl", mode = "template" }
"~/.config/git/ignore" = "dot_config/git/ignore"
"~/.config/zellij/" = { source = "dot_config/zellij/", mode = "copy" }
"~/.config/mise/config.toml" = "~/src/github.com/jclem/dotfiles/mise.toml"
"~/.ssh/config" = "dot_ssh/config"

# Binaries
"~/.local/bin/update_appearance.fish" = "dot_local/bin/update_appearance.fish"
"~/.local/bin/watch_appearance.fish" = "dot_local/bin/watch_appearance.fish"
"~/.local/bin/raycast/" = { source = "dot_local/bin/raycast/", mode = "copy" }

# Less-used shell configs.
"~/.bashrc" = "dot_bashrc"
"~/.zprofile" = "dot_zprofile"
"~/.zshrc" = "dot_zshrc"
