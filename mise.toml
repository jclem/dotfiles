[tools]
"aqua:npm" = "latest"
atuin = "latest"
"github:jclem/get" = "latest"
node = "latest"
usage = "latest"

[settings]
dotfiles.root = "~/.dotfiles"
experimental = true
trusted_config_paths = ["/Users/jclem/src/github.com/makenotion/notion-next"]

# macOS Dock preferences
# https://mise.jdx.dev/bootstrap/macos-defaults.html
[bootstrap.macos.dock]
autohide = true
orientation = "right"
show_recents = false
tilesize = 32

# macOS Finder preferences
# https://mise.jdx.dev/bootstrap/macos-defaults.html
[bootstrap.macos.finder]
preferred_view_style = "column"
show_all_files = true
show_pathbar = true

# Machine bootstrap packages
# https://mise.jdx.dev/bootstrap.html
# https://mise.jdx.dev/bootstrap/packages/brew.html
[bootstrap.packages]
"brew:bat" = "latest"
"brew:btop" = "latest"
"brew:eza" = "latest"
"brew:fd" = "latest"
"brew:fish" = "latest"
"brew:fzf" = "latest"
"brew:gh" = "latest"
"brew:git" = "latest"
"brew:jq" = "latest"
"brew:lazydocker" = "latest"
"brew:lazygit" = "latest"
"brew:neovim" = "latest"
"brew:ripgrep" = "latest"
"brew:watchexec" = "latest"
"brew:wget" = "latest"
"brew:zellij" = "latest"
"brew-cask:1password-cli" = "latest"

# User login shell
# https://mise.jdx.dev/bootstrap/user.html
[bootstrap.user]
login_shell = "/opt/homebrew/bin/fish"

# Managed dotfiles
# https://mise.jdx.dev/dotfiles.html
[dotfiles]
"~/.bashrc" = ".bashrc"
"~/.dotfiles" = "~/src/github.com/jclem/dotfiles2"

"~/.config/bat/" = { source = ".config/bat/", mode = "symlink-each" }
"~/.config/btop/" = { source = ".config/btop/", mode = "symlink-each" }
"~/.config/fish/" = { source = ".config/fish/", mode = "symlink-each" }
"~/.config/gh/" = { source = ".config/gh/", mode = "symlink-each" }
"~/.config/ghostty/" = { source = ".config/ghostty/", mode = "symlink-each" }
"~/.config/nvim/" = { source = ".config/nvim/", mode = "symlink-each" }

# Render machine-local Git identity values with Tera.
# https://mise.jdx.dev/templates.html
"~/.config/git/config" = { source = ".config/git/config.tmpl", mode = "template" }
"~/.config/git/ignore" = ".config/git/ignore"
"~/.config/zellij/" = { source = ".config/zellij/", mode = "symlink-each" }
"~/.config/mise/config.toml" = "~/src/github.com/jclem/dotfiles2/mise.toml"
"~/.ssh/config" = ".ssh/config"
"~/.zshrc" = ".zshrc"
