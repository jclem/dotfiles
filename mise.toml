[tools]
"aqua:npm" = "latest"
atuin = "latest"
"github:jclem/get" = "latest"
go = "latest"
"go:golang.org/x/tools/gopls" = "latest"
golangci-lint = "latest"
golangci-lint-langserver = "latest"
lua-language-server = "latest"
node = "latest"
"npm:@actions/languageserver" = "latest"
"npm:@typescript/native-preview" = "7.0.0-dev.20260626.1"
"npm:@vtsls/language-server" = "latest"
"npm:vscode-langservers-extracted" = "latest"
"npm:yaml-language-server" = "latest"
rust = "latest"
rust-analyzer = "latest"
usage = "latest"

[settings]
dotfiles.root = "~/.dotfiles"
experimental = true

# macOS Dock preferences
# https://mise.jdx.dev/bootstrap/macos-defaults.html
[bootstrap.macos.dock]
autohide = true
orientation = "right"
show_recents = false
tilesize = 32

# macOS Finder preferences
# https://mise.jdx.dev/bootstrap/macos-defaults.html
[bootstrap.macos.finder]
preferred_view_style = "column"
show_all_files = true
show_pathbar = true

# Machine bootstrap packages
# https://mise.jdx.dev/bootstrap.html
# https://mise.jdx.dev/bootstrap/packages/brew.html
[bootstrap.packages]
"brew:bat" = "latest"
"brew:btop" = "latest"
"brew:eza" = "latest"
"brew:fd" = "latest"
"brew:fish" = "latest"
"brew:fish-lsp" = "latest"
"brew:fzf" = "latest"
"brew:gh" = "latest"
"brew:git" = "latest"
"brew:jq" = "latest"
"brew:lazydocker" = "latest"
"brew:lazygit" = "latest"
"brew:neovim" = "latest"
"brew:ripgrep" = "latest"
"brew:tree-sitter-cli" = "latest"
"brew:watchexec" = "latest"
"brew:wget" = "latest"
"brew:zellij" = "latest"
"brew-cask:1password-cli" = "latest"

# User login shell
# https://mise.jdx.dev/bootstrap/user.html
[bootstrap.user]
login_shell = "/opt/homebrew/bin/fish"

# Managed dotfiles
# https://mise.jdx.dev/dotfiles.html
[dotfiles]
"~/.dotfiles" = "~/src/github.com/jclem/dotfiles"

"~/.config/bat/" = { source = "dot_config/bat/", mode = "symlink-each" }
"~/.config/btop/" = { source = "dot_config/btop/", mode = "symlink-each" }
"~/.config/fish/" = { source = "dot_config/fish/", mode = "symlink-each" }
"~/.config/gh/" = { source = "dot_config/gh/", mode = "symlink-each" }
"~/.config/ghostty/" = { source = "dot_config/ghostty/", mode = "symlink-each" }
"~/.config/nvim/" = { source = "dot_config/nvim/", mode = "symlink-each" }
"~/.config/ripgrep/" = { source = "dot_config/ripgrep/", mode = "symlink-each" }

# Render machine-local Git identity values with Tera.
# https://mise.jdx.dev/templates.html
"~/.config/git/config" = { source = "dot_config/git/config.tmpl", mode = "template" }
"~/.config/git/ignore" = "dot_config/git/ignore"
"~/.config/zellij/" = { source = "dot_config/zellij/", mode = "symlink-each" }
"~/.config/mise/config.toml" = "~/src/github.com/jclem/dotfiles/mise.toml"
"~/.ssh/config" = "dot_ssh/config"

# Less-used shell configs.
"~/.bashrc" = "dot_bashrc"
"~/.zshrc" = "dot_zshrc"
